[phases.setup]
# postgresql_16 is included only for its client binaries (pg_dump / pg_restore)
# used by backup.py to take logical dumps for the off-site encrypted backups.
# It does NOT run a Postgres server in the container.
nixPkgs = ["python312", "postgresql_16"]

[phases.install]
cmds = [
  "python3 -m venv --copies /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip",
  "/opt/venv/bin/pip install -r requirements.txt"
]

# `alembic upgrade head` runs as part of the start command so a fresh
# instance applies any pending schema changes before serving traffic.
# Operators can override START_CMD to switch this service to the worker
# role (e.g. `python worker.py`) without rebuilding the image.
[start]
cmd = "/opt/venv/bin/alembic upgrade head && /opt/venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT"
