[pytest]
# Project-wide pytest config.
#
# Tests live in tests/. Each test file is named test_*.py. Async tests
# use the asyncio mode = auto setting so we don't have to decorate every
# coroutine — anyio's strict mode is too noisy for this codebase's
# pragmatic style.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

# pytest-asyncio 1.x no longer honours a user-defined `event_loop` fixture.
# The DB pool is created once in a session-scoped fixture (conftest.db_pool);
# for the asyncpg pool to be usable from the tests and the per-test clean_db
# fixture, those must run on the SAME loop. Pin both the fixture and test
# default loop scope to session so the whole suite shares one event loop
# (this replaces the old session-scoped event_loop fixture).
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session

# Markers:
#   unit         — pure functions, no DB, no I/O. Run anywhere.
#   integration  — needs a real Postgres (testcontainers or TEST_DATABASE_URL).
#                  Auto-skipped if neither is available.
#   slow         — runs > 1s. Optional opt-out: `pytest -m "not slow"`.
markers =
    unit:        Pure unit test. No DB, no network. Always runs.
    integration: Needs a Postgres. Skipped if no DB available.
    slow:        Takes more than 1 second. Run by default; opt out with -m 'not slow'.

# Show 30 slowest tests after the run — surfaces accidental I/O in unit tests.
addopts = --strict-markers --durations=30 --tb=short

# Default warning policy: visible but non-fatal. The codebase has
# pre-Phase-2 tech debt (FastAPI on_event, asyncpg JSONB encoder) that
# we don't want polluting test output as failures. Tests that care
# about strict warnings can opt in with @pytest.mark.filterwarnings.
filterwarnings =
    ignore::DeprecationWarning
    ignore::ResourceWarning
    ignore::PendingDeprecationWarning
