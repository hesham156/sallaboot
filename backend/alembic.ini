# Alembic configuration — Sallabot
#
# Migrations are tracked in alembic/versions/. The runtime app uses asyncpg
# for query execution; alembic runs sync with psycopg2 because (a) migrations
# are one-off ops where sync is simpler, (b) alembic's async support adds
# complexity we don't need yet. The DATABASE_URL env var is rewritten in
# env.py to ensure a postgresql+psycopg2:// dialect even when Railway
# supplies the legacy postgres:// or asyncpg-flavoured form.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# sqlalchemy.url is set programmatically in env.py from $DATABASE_URL —
# DO NOT hardcode it here (it would override the env var on every run).
sqlalchemy.url =

# Use a sortable UTC date + slug for new migration filenames so
# `ls alembic/versions/` reads in chronological order:
#   2026_06_07_1453-abc123_add_inbox.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
timezone = UTC

[post_write_hooks]
# Optional: enable to auto-format new revisions. Leave off for now.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
